<!DOCTYPE html>

<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet"/>

</head>
<body>

  <div class="top-bar">
    <img src="images/301-3011725_mosaic-happy-birthday-banner-clipart (1).png" alt="Happy Birthday Banner"/>

  <section class="msg-section">
    <div class="msg-card">

      <p>happy birthday jun i wish u a room filled with fugglers and chinchilla poop!</p>
      
      <video width="320" height="240" controls>
        <source src="images/Jayden/IMG_5768.MOV" type="video/mp4">

      <video width="320" height="240" controls>
        <source src="images/Jayden/IMG_1269.MOV" type="video/mp4">
      </video>
    </div>

  <script src="JavaScript/confetti.js"></script>
  <script src="JavaScript/confettiBG.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const link = document.getElementById('delayed-link');
      if (link) {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const dest = link.getAttribute('href');
          document.body.style.opacity = '0';
          document.body.style.transition = 'opacity 0.6s ease';
          setTimeout(() => { window.location.href = dest; }, 650);
        });
      }
    });
  </script>
