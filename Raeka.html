<head>

  <title>Raeka — Birthday Wish</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet"/>

<body>

  <div class="top-bar">
    <img src="images/301-3011725_mosaic-happy-birthday-banner-clipart (1).png" alt="Happy Birthday Banner"/>
    <a class="back-btn" id="delayed-link" href="BirthdayWishes.html">← Back</a>
  </div>

  <section class="msg-section">
    <div class="msg-card">
      <span class="from-label">a message from</span>
      <h1>Raeka</h1>
      <div class="divider"></div>
      <p>HAPPY BIRTHDAY JUNNN
THANK YOU FOR ALL THE MEMORIES WE HAVE MADE! YOU ARE SOOOO LOVED AND CARED FOR! HAVE A SWEET 18TH </p>
    </div>
  </section>

  <script src="JavaScript/confetti.js"></script>
  <script src="JavaScript/confettiBG.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const link = document.getElementById('delayed-link');
      if (link) {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const dest = link.getAttribute('href');
          document.body.style.opacity = '0';
          document.body.style.transition = 'opacity 0.6s ease';
          setTimeout(() => { window.location.href = dest; }, 650);
        });
      }
    });
  </script>
