<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasper — Birthday Wish</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <div class="top-bar">
    <img src="images/301-3011725_mosaic-happy-birthday-banner-clipart (1).png" alt="Happy Birthday Banner"/>
    <a class="back-btn" id="delayed-link" href="BirthdayWishes.html">← Back</a>
  </div>

  <section class="msg-section">
    <div class="msg-card">
      <span class="from-label">a message from</span>
      <h1>Kasper</h1>
      <div class="divider"></div>
     <img src="images/Kasper/photo_2026-07-01_19-10-29.jpg" class="eren-wtf" alt="">
     <p class="arrow-up">↑</p>
     <img src="images/Kasper/images.jpg" class="dog-wtf" alt="">
  
    </div>
  </section>

  <script src="JavaScript/confetti.js"></script>
  <script src="JavaScript/confettiBG.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const link = document.getElementById('delayed-link');
      if (link) {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const dest = link.getAttribute('href');
          document.body.style.opacity = '0';
          document.body.style.transition = 'opacity 0.6s ease';
          setTimeout(() => { window.location.href = dest; }, 650);
        });
      }
    });
  </script>
</body>
</html>
